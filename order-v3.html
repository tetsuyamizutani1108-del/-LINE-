<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE発注</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f4f4;--surface:#fff;--surface2:#f0f0f0;--border:#e0e0e0;--accent:#ff6b35;--text:#1a1a1a;--muted:#999;--green:#22c55e;--checked-bg:#f0fff4;--checked-border:#86efac;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:0 0 110px;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.h-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
h1{font-size:17px;font-weight:900;}
.tag{font-family:'DM Mono',monospace;font-size:10px;background:var(--accent);color:#fff;padding:2px 7px;border-radius:3px;letter-spacing:1px;}
.tabs{display:flex;gap:4px;margin-bottom:10px;}
.tab{flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center;}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.prog-row{display:flex;align-items:center;gap:10px;}
.prog-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;width:0%;}
.prog-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
.main{padding:0 14px;max-width:600px;margin:0 auto;}
.page{display:none;}.page.on{display:block;}

/* ORDER */
.cat{margin-top:18px;}
.cat-hd{display:flex;align-items:center;gap:7px;margin-bottom:7px;padding:0 2px;}
.cat-icon{font-size:15px;}
.cat-nm{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(–muted);}
.cat-ct{font-family:‘DM Mono’,monospace;font-size:10px;color:var(–accent);margin-left:auto;}
.items{display:flex;flex-direction:column;gap:3px;}
.item{display:flex;align-items:center;background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:10px 13px;cursor:pointer;transition:all .15s;gap:10px;user-select:none;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.item:active{transform:scale(.98);}
.item.chk{background:var(–checked-bg);border-color:var(–checked-border);}
.cb{width:22px;height:22px;border:2px solid var(–border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(–surface2);transition:all .15s;}
.item.chk .cb{background:var(–green);border-color:var(–green);}
.ck{display:none;color:#fff;font-size:13px;font-weight:900;}
.item.chk .ck{display:block;}
.item-info{flex:1;min-width:0;}
.iname{font-size:14px;font-weight:500;}
.item.chk .iname{color:var(–muted);text-decoration:line-through;}
.ilast{font-size:11px;font-family:‘DM Mono’,monospace;flex-shrink:0;margin-left:auto;padding-left:8px;}
.ilast.d0{color:#16a34a;font-weight:700;}
.ilast.d2{color:#ca8a04;}
.ilast.d3{color:#dc2626;font-weight:700;}
.qty-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.qb{width:27px;height:27px;background:var(–surface2);border:1px solid var(–border);border-radius:6px;color:var(–text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .1s;}
.qb:active{background:var(–accent);color:#fff;border-color:var(–accent);}
.qv{font-family:‘DM Mono’,monospace;font-size:14px;font-weight:500;min-width:18px;text-align:center;color:var(–accent);}
.item.chk .qv{color:var(–muted);}

/* HISTORY */
.hist-empty{text-align:center;padding:60px 20px;color:var(–muted);}
.hist-empty-ic{font-size:44px;margin-bottom:10px;}
.hcard{background:var(–surface);border:1px solid var(–border);border-radius:12px;margin-top:14px;overflow:hidden;}
.hcard-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(–border);background:var(–surface2);}
.hdate{font-weight:700;font-size:14px;}
.hmeta{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–muted);}
.hchips{display:flex;flex-wrap:wrap;gap:5px;padding:11px 14px;}
.hchip{background:#fff0eb;color:var(–accent);border:1px solid #fcd9c8;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.hcard-ft{display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(–border);}
.hbtn{flex:1;padding:9px;border-radius:8px;border:none;font-family:‘Noto Sans JP’,sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.hbtn-load{background:var(–accent);color:#fff;}
.hbtn-del{background:var(–surface2);color:var(–muted);border:1px solid var(–border);flex:0 0 auto;padding:9px 14px;}

/* BOTTOM */
.bot{position:fixed;bottom:0;left:0;right:0;background:var(–surface);border-top:1px solid var(–border);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;box-shadow:0 -2px 8px rgba(0,0,0,.06);}
.btn{flex:1;padding:13px;border-radius:10px;border:none;font-family:‘Noto Sans JP’,sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-p{background:var(–accent);color:#fff;}
.btn-p:active{background:#e05520;}
.btn-s{background:var(–surface2);color:var(–text);border:1px solid var(–border);flex:0 0 auto;padding:13px 16px;}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);background:#1a1a1a;color:#fff;font-weight:700;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;padding:20px;align-items:flex-end;}
.overlay.on{display:flex;}
.modal{background:var(–surface);border-radius:16px;width:100%;max-width:560px;margin:0 auto;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal-hd{padding:15px 18px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:14px;font-weight:700;}
.modal-x{background:none;border:none;color:var(–muted);font-size:20px;cursor:pointer;line-height:1;}
.modal-body{padding:14px 18px;max-height:55vh;overflow-y:auto;}
.preview{background:var(–surface2);border-radius:10px;padding:13px 15px;font-size:13px;line-height:1.9;white-space:pre-wrap;font-family:‘Noto Sans JP’,sans-serif;border:1px solid var(–border);word-break:break-all;}
.modal-ft{padding:11px 18px;border-top:1px solid var(–border);display:flex;gap:8px;}
</style>

</head>
<body>

<header>
  <div class="h-top">
    <h1>📋 LINE発注</h1><span class="tag">天よし</span>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab('order')">✏️ 発注</button>
    <button class="tab" onclick="switchTab('hist')">🕐 履歴</button>
  </div>
  <div class="prog-row" id="progRow">
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-lbl" id="progLbl">0 / 0</div>
  </div>
</header>

<div class="main">
  <div class="page on" id="page-order"></div>
  <div class="page" id="page-hist"></div>
</div>

<div class="bot" id="bot">
  <button class="btn btn-s" onclick="resetAll()">リセット</button>
  <button class="btn btn-p" onclick="openLineModal()">📋 LINEメッセージ生成</button>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title">📱 LINEへコピー</div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="preview" id="preview"></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-s" onclick="closeModal()" style="flex:0 0 auto;padding:13px 16px;">閉じる</button>
      <button class="btn btn-p" onclick="copyLine()">コピーする</button>
    </div>
  </div>
</div>

<script>
const CATS = [
  {icon:'🐟',name:'魚・海鮮',items:[
    {id:'f1',name:'穴子'},{id:'f2',name:'尻尾なし',hasQty:true,min:1,max:6},
    {id:'f3',name:'タイ'},{id:'f4',name:'イカ'},{id:'f5',name:'イカ明太'},
    {id:'f6',name:'うなぎ'},{id:'f7',name:'サーモン'},{id:'f8',name:'カキ'},
    {id:'f9',name:'エビ'},{id:'f10',name:'車海老'},{id:'f11',name:'ホタテ'},
    {id:'f12',name:'カニ'},{id:'f13',name:'ハモ'},{id:'f14',name:'白子'},{id:'f15',name:'タチウオ'},
  ]},
  {icon:'🥩',name:'肉・加工品',items:[
    {id:'m1',name:'鳥もも'},{id:'m2',name:'牛すじ'},{id:'m3',name:'肉茶そばの肉'},{id:'m5',name:'肉団子'},
  ]},
  {icon:'🥦',name:'野菜',items:[
    {id:'v1',name:'さつまいも',hasQty:true,min:1,max:6},{id:'v2',name:'カボチャ',hasQty:true,min:1,max:6},
    {id:'v3',name:'まいたけ',hasQty:true,min:1,max:6},{id:'v4',name:'ナス'},{id:'v5',name:'ピーマン'},
    {id:'v6',name:'ごぼう'},{id:'v7',name:'インゲン'},{id:'v8',name:'オクラ'},
    {id:'v9',name:'大葉'},{id:'v10',name:'レモン'},
  ]},
  {icon:'🥚',name:'卵・乳製品',items:[
    {id:'e1',name:'温玉',hasQty:true,min:1,max:6},{id:'e2',name:'ゆで卵'},{id:'e4',name:'チーズ'},
  ]},
  {icon:'🍜',name:'麺・乾物',items:[
    {id:'n1',name:'茶そば'},{id:'n2',name:'うどん出汁'},{id:'n7',name:'茶そばタレ'},
    {id:'n3',name:'いりこ'},{id:'n4',name:'花かつお'},{id:'n5',name:'昆布'},{id:'n6',name:'わかめ'},
  ]},
  {icon:'🍶',name:'調味料・タレ',items:[
    {id:'s1',name:'天つゆのもと',hasQty:true,min:1,max:6},{id:'s2',name:'天丼タレ',hasQty:true,min:1,max:6},
    {id:'s3',name:'弁当タレ'},{id:'s5',name:'だし醤油'},{id:'s6',name:'大根おろし'},
    {id:'s11',name:'大根おろし❌'},{id:'s8',name:'米油'},{id:'s9',name:'てんぷら粉'},{id:'s12',name:'赤出汁みそ'},
  ]},
  {icon:'🫙',name:'おでん種・揚げ物',items:[
    {id:'o1',name:'ごぼう天'},{id:'o2',name:'丸天'},{id:'o3',name:'こんにゃく'},
    {id:'o4',name:'おでん用大根'},{id:'o5',name:'豆腐'},{id:'o6',name:'おでん味噌'},
  ]},
  {icon:'🥤',name:'飲み物',items:[
    {id:'d1',name:'コーラ'},{id:'d2',name:'ジンジャーエール'},{id:'d3',name:'カルピス'},
    {id:'d4',name:'オレンジジュース'},{id:'d5',name:'炭酸水'},{id:'d6',name:'烏龍茶'},
    {id:'d7',name:'芋焼酎'},{id:'d8',name:'麦焼酎'},
  ]},
  {icon:'🍨',name:'デザート',items:[
    {id:'sw1',name:'イチゴアイス'},
  ]},
];

// state
const state = {};
CATS.forEach(c => c.items.forEach(i => { state[i.id] = {checked:false, qty:i.min||1}; }));

// storage keys
const HIST_KEY = 'amayoshi_order_history';
const LAST_KEY = 'amayoshi_last_ordered';

function loadHistory() {
  try {
    const hist = JSON.parse(localStorage.getItem(HIST_KEY)||'[]');
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30); cutoff.setHours(0,0,0,0);
    return hist.filter(h => new Date(h.date) >= cutoff);
  } catch(e){ return []; }
}
function saveHistory(h) {
  localStorage.setItem(HIST_KEY, JSON.stringify(h));
}
function loadLastOrdered() {
  try { return JSON.parse(localStorage.getItem(LAST_KEY)||'{}'); } catch(e){ return {}; }
}
function saveLastOrdered(m) {
  localStorage.setItem(LAST_KEY, JSON.stringify(m));
}

function dayDiff(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  d.setHours(0,0,0,0); now.setHours(0,0,0,0);
  return Math.round((now - d) / 86400000);
}

function lastLabel(id) {
  const m = loadLastOrdered();
  if (!m[id]) return null;
  const d = dayDiff(m[id]);
  if (d > 15) return null;
  if (d === 0) return {text:'今日', cls:'d0'};
  if (d <= 3)  return {text:`${d}日前`, cls:'d3'};
  return {text:`${d}日前`, cls:'d2'};
}

// ---- RENDER ORDER ----
function renderOrder() {
  const el = document.getElementById('page-order');
  el.innerHTML = '';
  CATS.forEach(cat => {
    const checked = cat.items.filter(i => state[i.id].checked).length;
    const catEl = document.createElement('div');
    catEl.className = 'cat';
    catEl.innerHTML = `
      <div class="cat-hd">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-nm">${cat.name}</span>
        <span class="cat-ct">${checked}/${cat.items.length}</span>
      </div>
      <div class="items" id="cat-${cat.name}"></div>`;
    el.appendChild(catEl);
    const itemsEl = catEl.querySelector('.items');
    cat.items.forEach(item => {
      const s = state[item.id];
      const lbl = lastLabel(item.id);
      const div = document.createElement('div');
      div.className = 'item' + (s.checked ? ' chk' : '');
      div.innerHTML = `
        <div class="cb"><span class="ck">✓</span></div>
        <div class="item-info">
          <div class="iname">${item.name}</div>
        </div>
        ${lbl ? `<span class="ilast ${lbl.cls}">${lbl.text}</span>` : ''}
        ${item.hasQty ? `
        <div class="qty-wrap">
          <button class="qb" onclick="chQty(event,'${item.id}',-1)">−</button>
          <span class="qv">${s.qty}</span>
          <button class="qb" onclick="chQty(event,'${item.id}',1)">＋</button>
        </div>` : ''}`;
      div.addEventListener('click', e => {
        if (e.target.closest('.qb')) return;
        toggle(item.id);
      });
      itemsEl.appendChild(div);
    });
  });
  updateProg();
}

function toggle(id) {
  state[id].checked = !state[id].checked;
  renderOrder();
}
function chQty(e, id, d) {
  e.stopPropagation();
  const item = CATS.flatMap(c=>c.items).find(i=>i.id===id);
  state[id].qty = Math.min(item.max||99, Math.max(item.min||1, state[id].qty+d));
  renderOrder();
}
function updateProg() {
  const ids = Object.keys(state);
  const n = ids.filter(id=>state[id].checked).length;
  document.getElementById('progFill').style.width = (n/ids.length*100)+'%';
  document.getElementById('progLbl').textContent = `${n} / ${ids.length}`;
}
function resetAll() {
  CATS.forEach(c=>c.items.forEach(i=>{ state[i.id]={checked:false,qty:i.min||1}; }));
  renderOrder();
  showToast('リセットしました');
}

// ---- LINE MODAL ----
function buildLineText() {
  const lines = [];
  const now = new Date();
  const ds = `${now.getMonth()+1}/${now.getDate()}`;
  const yw = ['日','月','火','水','木','金','土'][now.getDay()];
  lines.push(`【発注】${ds}(${yw})`);
  lines.push('');
  CATS.forEach(cat => {
    const sel = cat.items.filter(i=>state[i.id].checked);
    if (!sel.length) return;
    lines.push(`▼${cat.name}`);
    sel.forEach(item => {
      lines.push(item.hasQty ? `・${item.name} ×${state[item.id].qty}` : `・${item.name}`);
    });
    lines.push('');
  });
  lines.push('宜しくお願いします🙇');
  return lines.join('\n');
}

function openLineModal() {
  const checked = Object.values(state).some(s=>s.checked);
  if (!checked) { showToast('商品を選択してください'); return; }
  document.getElementById('preview').textContent = buildLineText();
  document.getElementById('modal').classList.add('on');
}
function closeModal() {
  document.getElementById('modal').classList.remove('on');
}
function copyLine() {
  const text = document.getElementById('preview').textContent;
  // save history
  const now = new Date();
  const dateStr = now.toISOString().split('T')[0];
  const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const items = CATS.flatMap(c=>c.items).filter(i=>state[i.id].checked).map(i=>({
    id:i.id, name:i.name, qty:i.hasQty?state[i.id].qty:null
  }));
  const hist = loadHistory();
  hist.unshift({date:dateStr, time:timeStr, items, text});
  if (hist.length > 30) hist.pop();
  saveHistory(hist);
  // save last ordered per item
  const last = loadLastOrdered();
  items.forEach(i=>{ last[i.id]=dateStr; });
  saveLastOrdered(last);

  navigator.clipboard.writeText(text).then(()=>{
    closeModal();
    showToast('コピーしました！LINEに貼り付けてください');
    renderOrder(); // refresh last labels
  }).catch(()=>showToast('コピーに失敗しました'));
}

// ---- HISTORY ----
function renderHist() {
  const el = document.getElementById('page-hist');
  const hist = loadHistory();
  if (!hist.length) {
    el.innerHTML = `<div class="hist-empty"><div class="hist-empty-ic">📭</div>まだ履歴がありません</div>`;
    return;
  }
  el.innerHTML = '';
  hist.forEach((h, idx) => {
    const d = new Date(h.date);
    const yw = ['日','月','火','水','木','金','土'][d.getDay()];
    const diff = dayDiff(h.date);
    const diffStr = diff===0?'今日':diff===1?'昨日':`${diff}日前`;
    const card = document.createElement('div');
    card.className = 'hcard';
    card.innerHTML = `
      <div class="hcard-hd">
        <span class="hdate">${h.date.replace(/-/g,'/')}(${yw}) ${h.time}</span>
        <span class="hmeta">${diffStr} · ${h.items.length}品</span>
      </div>
      <div class="hchips">${h.items.map(i=>`<span class="hchip">${i.name}${i.qty?` ×${i.qty}`:''}</span>`).join('')}</div>
      <div class="hcard-ft">
        <button class="hbtn hbtn-load" onclick="loadFromHist(${idx})">この内容を読み込む</button>
        <button class="hbtn hbtn-del" onclick="delHist(${idx})">削除</button>
      </div>`;
    el.appendChild(card);
  });
}

function loadFromHist(idx) {
  const hist = loadHistory();
  const h = hist[idx];
  // reset
  CATS.forEach(c=>c.items.forEach(i=>{ state[i.id]={checked:false,qty:i.min||1}; }));
  h.items.forEach(i=>{
    if (state[i.id] !== undefined) {
      state[i.id].checked = true;
      if (i.qty) state[i.id].qty = i.qty;
    }
  });
  switchTab('order');
  showToast(`${h.date}の発注を読み込みました`);
}

function delHist(idx) {
  const hist = loadHistory();
  hist.splice(idx, 1);
  saveHistory(hist);
  renderHist();
  showToast('削除しました');
}

// ---- TABS ----
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',['order','hist'][i]===t));
  document.getElementById('page-order').classList.toggle('on', t==='order');
  document.getElementById('page-hist').classList.toggle('on', t==='hist');
  document.getElementById('progRow').style.display = t==='order'?'flex':'none';
  document.getElementById('bot').style.display = t==='order'?'flex':'none';
  if (t==='hist') renderHist();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'), 2500);
}

renderOrder();
</script>

</body>
</html>
